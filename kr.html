<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dooly Project</title>
    <link rel="stylesheet" href="styles.css">
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <a href="index.html" class="languageLink">
            <button class="languageButton">
            English 🇺🇸
            </button>
        </a>
        
        <h1>둘리 간식 카운터</h1>
        <img src="dooly_1.png" alt="Dooly the cat">

        <p id="doolySpeech">"집사야 밥 줘라 🥣"</p>
    
        <div class="hungerBox">
           <div class="hungerTitle">
               <p>두리의 배고픔</p>
               <p id="hungerPercent">0%</p>
           </div>

           <div class="progressBox">
               <div id="progressBar"></div>
           </div>

           <p id="doolyEmotion">둘리가 배고파...</p>
        </div>
        
        <p>둘리에게 맘마 주세요 ⬇️ </p>

        <button id="feedButton">간식 주기 🍗</button>
        <p id="achievement"></p>
        <p id="treatCount">간식 개수: 0</p>
      
        <button id="resetButton">간식 초기화 🔄</button>

        <p class="footer">Made by Phiriya 🐾</p>
    </div>

    <script>
        let audioUnlocked = false;

        document.addEventListener("click", function () {

            if (!audioUnlocked) {

            buttonhoverSound.play();
            buttonhoverSound.pause();
            buttonhoverSound.currentTime = 0;

            buttonSound.play();
            buttonSound.pause();
            buttonSound.currentTime = 0;

            audioUnlocked = true;
        }

       });


        // Button hover project
        const treatButton = document.getElementById("feedButton");
        const languageButton = document.querySelector(".languageButton");
        const buttonhoverSound = new Audio("button-hover.mp3");

        languageButton.addEventListener("mouseover", function () {

            buttonhoverSound.currentTime = 0;
            buttonhoverSound.play();

        });

        treatButton.addEventListener("mouseover", function () {

            buttonhoverSound.currentTime = 0;
            buttonhoverSound.play();

            if (treatButton.disabled === true) {
            treatButton.textContent = "노오오옵! 🚫";
            }
            else {
                treatButton.textContent = "둘리에게 간식 주라! 🫵🏻";
            }
        
        });

        treatButton.addEventListener("mouseout", function () {
            if (treatButton.disabled === true) {
            treatButton.textContent = "노오오옵! 🚫";
            }

            else {
                treatButton.textContent = "간식 주기 🍗";
            } 

        });


        // Speech bubble project
        const speechText = document.getElementById("doolySpeech");
        const progressBar = document.getElementById("progressBar");


        
        // Treat counter project + Emotion project + Achievement project + Shake animated project
        const treatText = document.getElementById("treatCount");
        const emotionText = document.getElementById("doolyEmotion");
        const achievementText = document.getElementById("achievement");
        const card = document.querySelector(".card");

        const buttonSound = new Audio("ui-button.mp3");
        const achievementSound = new Audio("achievement-bling.mp3");
        const errorSound = new Audio("error.mp3");
        
        let treats = 0;

        treatButton.addEventListener("click", function () {

            treats = treats + 1;
            progressBar.style.width = treats * 10 + "%";

            document.getElementById("hungerPercent").textContent = treats * 10 + "%";

            buttonSound.currentTime = 0;
            buttonSound.play();

            if (treats === 5) {
               achievementText.style.display = "inline-block";

               achievementText.textContent = "🏆 목표 달성: 두리 최애 집사 🎉";

               achievementSound.currentTime = 0;
               achievementSound.play();
            }

            else if (treats === 10) {
                achievementText.style.display = "inline-block";

                achievementText.textContent = "🏆 목표 달성: 두리 살찌우기 전문가 😭";

                achievementSound.currentTime = 0;
                achievementSound.play();
            }

            else {
                achievementText.style.display = "none";
                achievementText.textContent = "";
            }
            

            treatText.textContent = "간식 개수: " + treats;
               if (treats > 10) {
                emotionText.textContent = "이제 그만!!! 두리 뚱냥이 된다";
                speechText.textContent = '"그만!!! 😾🚨"';
                
                progressBar.style.width = "100%";

                document.getElementById("hungerPercent").textContent = "100%";

                treatButton.textContent = "노오오옵! 🚫";
                treatButton.disabled = true;

                // card.style.backgroundColor = "#ffe0e0";
                progressBar.style.backgroundColor = "red";

                card.classList.add("shake");
                setTimeout(function () {
                   card.classList.remove("shake");
                }, 400);

                errorSound.currentTime = 0;
                errorSound.play();
               }

               else if (treats > 8) {
                emotionText.textContent = "두리 배가 너무 빵빵하다";
                speechText.textContent = '"좀 배불르다냥...😾💢"';
                
                progressBar.style.backgroundColor = "orange";
               }

               else if (treats > 5) {
                emotionText.textContent = "간식이 너무 많다냥";
                speechText.textContent = '"야...천천히 좀 줘라 🙀⁉️"';

                progressBar.style.backgroundColor = "yellow";
               }

               else if (treats > 2) {
                emotionText.textContent = "두리가 의심하고 있다";
                speechText.textContent = '"뭐냥...왜 이렇게 많이 주는 거냥 😼❓"';

                progressBar.style.backgroundColor = "lightgreen";
               }
            
               else {
                emotionText.textContent = "둘리가 행복하다냥";
                speechText.textContent = '"냠냠!!! 😻❤️"';

                progressBar.style.backgroundColor = "lightblue";
               }

        });

        languageButton.addEventListener("click", function () {
            buttonSound.currentTime = 0;
            buttonSound.play();

        });


        // Reset treats button project
        const resetButton = document.getElementById("resetButton");
        
        resetButton.addEventListener("mouseover", function() {
            buttonhoverSound.currentTime = 0;
            buttonhoverSound.play();

        });
    
        resetButton.addEventListener("click", function () {
            treats = 0;
            treatText.textContent = "간식 개수: 0";
            emotionText.textContent = "두리가 간식을 기다리는 중";

            speechText.textContent = '"집사야 밥 줘라 🥣"';
            progressBar.style.width = "0%";

            treatButton.disabled = false;
            treatButton.textContent = "간식 주기 🍗";

            // card.style.backgroundColor = "white";

            progressBar.style.backgroundColor = "lightblue";
            document.getElementById("hungerPercent").textContent = "0%";


            achievementText.textContent = "";
            achievementText.style.display = "none";

            buttonSound.currentTime = 0;
            buttonSound.play();

        });
    </script>

</body>
</html>
